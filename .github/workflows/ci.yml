# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check:
    name: Flake check
    runs-on: ubuntu-latest
    steps:
      # The e2e NixOS VM test needs /dev/kvm to be writable by the runner user.
      - name: Enable KVM
        run: |
          sudo bash -c 'echo "KERNEL==\"kvm\", GROUP=\"kvm\", MODE=\"0666\"" > /etc/udev/rules.d/99-kvm.rules'
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31

      - name: Nix binary cache (GitHub Actions cache)
        uses: Mic92/hestia@fb239a2f72d4b6e26eec5425f289dea23b27a527 # v2

      - name: Flake check
        run: nix flake check -L

  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31

      - name: Nix binary cache (GitHub Actions cache)
        uses: Mic92/hestia@fb239a2f72d4b6e26eec5425f289dea23b27a527 # v2

      - name: Check formatting
        run: nix fmt -- --ci
