<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <clipPath id="icon-clip">
      <rect width="128" height="128" rx="27"/>
    </clipPath>
  </defs>
  <rect width="128" height="128" rx="27" fill="#1F5C4D"/>
  <!-- 3 rays from sun centre — disc then horizon cover their bases -->
  <line x1="64" y1="79" x2="64" y2="33" stroke="#E7C079" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="64" y1="79" x2="57" y2="44" stroke="#E4B061" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="64" y1="79" x2="71" y2="44" stroke="#E4B061" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Rising sun disc (cy=79 r=29 matches 244px design cy=150 r=56) -->
  <circle cx="64" cy="79" r="29" fill="#D99A3C"/>
  <!-- Horizon: thin waterline then deeper band -->
  <rect y="93" width="128" height="2"  fill="#0F3D33" clip-path="url(#icon-clip)"/>
  <rect y="95" width="128" height="33" fill="#164034" clip-path="url(#icon-clip)"/>
</svg>
