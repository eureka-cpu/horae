<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <clipPath id="icon-clip">
      <rect width="128" height="128" rx="26"/>
    </clipPath>
  </defs>
  <!-- Pine background (#1F5C4D = --color-pine) -->
  <rect width="128" height="128" rx="26" fill="#1F5C4D"/>
  <!-- Horizon shadow band — bottom ~31% of icon -->
  <rect y="88" width="128" height="40" fill="#153A31" clip-path="url(#icon-clip)"/>
  <!-- Rising sun — r=30 (47% of width), center above horizon, ~15% below -->
  <circle cx="64" cy="65" r="30" fill="#D99A3C"/>
  <!-- Rays — Y-shape from circle top (y=35), ~38° spread -->
  <g stroke="#D99A3C" stroke-width="3" stroke-linecap="round">
    <line x1="64" y1="35" x2="64" y2="20"/>
    <line x1="64" y1="35" x2="57" y2="26"/>
    <line x1="64" y1="35" x2="71" y2="26"/>
  </g>
</svg>
