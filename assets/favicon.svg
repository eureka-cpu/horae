<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="32" height="32">
  <defs>
    <clipPath id="fav-clip">
      <rect width="128" height="128" rx="26"/>
    </clipPath>
  </defs>
  <!-- Pine background (#1F5C4D = --color-pine) -->
  <rect width="128" height="128" rx="26" fill="#1F5C4D"/>
  <!-- Horizon shadow band -->
  <rect y="80" width="128" height="48" fill="#153A31" clip-path="url(#fav-clip)"/>
  <!-- Rising sun — rays omitted, they drop away at small sizes -->
  <circle cx="64" cy="80" r="38" fill="#D99A3C"/>
</svg>
